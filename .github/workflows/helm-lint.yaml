name: Helm Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm charts
        run: |
          for chart in argocd/charts/*; do
            if [ -d "$chart" ]; then
              helm lint "$chart"
            fi
          done
