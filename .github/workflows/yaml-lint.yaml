---
name: YAML Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              argocd/charts/*/templates/
              argocd/charts/*/.argocd-source-*.yaml
            rules:
              line-length:
                max: 120
                level: warning
              indentation:
                spaces: 2
              truthy:
                allowed-values: ['true', 'false', 'on']
              document-start:
                level: warning
              trailing-spaces:
                level: error
              empty-lines:
                level: warning
