---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-website
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: myimage=alexvplle/personal-website
    argocd-image-updater.argoproj.io/myimage.update-strategy: semver
    argocd-image-updater.argoproj.io/myimage.helm.image-spec: image.repository:image.tag
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alexvplle/infrastructure_as_code
    targetRevision: main
    path: argocd/charts/personal-website
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-website
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
