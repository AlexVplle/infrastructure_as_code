---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      values: |
        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - host: vault.alexvplle.com
                paths:
                  - /
            tls:
              - secretName: vault-tls
                hosts:
                  - vault.alexvplle.com
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
          standalone:
            enabled: true
          dataStorage:
            enabled: true
            size: 1Gi
        ui:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
